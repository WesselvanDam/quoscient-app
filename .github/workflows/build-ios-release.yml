name: Build iOS Release

on:
  workflow_dispatch:

jobs:
  build-ios-release:
    runs-on: macos-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.1"
          channel: "stable"
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          working-directory: ios

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Make .env file
        uses: SpicyPizza/create-envfile@v2.0
        with:
          envkey_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          envkey_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Run build_runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Setup iOS build environment
        run: |
          cd ios
          pod install --repo-update

      - name: Build Flutter iOS Release (no code sign)
        run: flutter build ios --release --no-codesign

      - name: Configure App Store Connect API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys/
          echo "${{ secrets.APPSTORE_API_PRIVATE_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8

      - name: Build iOS Archive
        run: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath build/ios \
            -archivePath build/ios/Runner.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPSTORE_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_API_ISSUER_ID }} \
            archive
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPSTORE_API_TEAM_ID }}
          CODE_SIGN_IDENTITY: "Apple Distribution"

      - name: Export IPA
        run: |
          cd ios
          xcodebuild -exportArchive \
            -archivePath build/ios/Runner.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ios/output \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPSTORE_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_API_ISSUER_ID }}
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPSTORE_API_TEAM_ID }}

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            -f ios/build/ios/output/Runner.ipa \
            -t ios \
            --apiKey ${{ secrets.APPSTORE_API_KEY_ID }} \
            --apiIssuer ${{ secrets.APPSTORE_API_ISSUER_ID }}